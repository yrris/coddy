# Optional local override file.
# Create application-local.yml only if you need machine-specific values.

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/coddy
    username: postgres
    password: postgres
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  deploy:
    host: http://localhost
  auth:
    frontend-url: http://localhost:5173
  ai:
    provider: langchain4j
    base-url: https://api.openai.com/v1
    api-key:
    model: gpt-4o-mini
    max-tokens: 4096
    temperature: 0.2
    stream-chunk-size: 64
    stream-delay-ms: 20
    output-root-dir: tmp/code_output
