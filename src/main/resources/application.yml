spring:
  application:
    name: coddy
  profiles:
    active: local
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  session:
    store-type: redis
    timeout: ${SESSION_TIMEOUT_SECONDS:2592000}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid,email,profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub

server:
  port: ${SERVER_PORT:8765}
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: ${SESSION_TIMEOUT_SECONDS:2592000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.yrris.coddy.controller

knife4j:
  enable: true
  setting:
    language: en

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  auth:
    frontend-url: ${FRONTEND_URL:http://localhost:5173}
    google:
      enabled: ${GOOGLE_AUTH_ENABLED:false}
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
  ai:
    provider: ${AI_PROVIDER:langchain4j}
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-5-mini}
    max-tokens: ${AI_MAX_TOKENS:4096}
    temperature: ${AI_TEMPERATURE:0.2}
    stream-chunk-size: ${AI_STREAM_CHUNK_SIZE:64}
    stream-delay-ms: ${AI_STREAM_DELAY_MS:20}
    output-root-dir: ${AI_OUTPUT_ROOT_DIR:tmp/code_output}

langchain4j:
  open-ai:
    chat-model:
      base-url: ${AI_BASE_URL:https://api.openai.com/v1}
      api-key: ${AI_API_KEY:placeholder-key}
      model-name: ${AI_MODEL:gpt-5-mini}
      max-tokens: ${AI_MAX_TOKENS:4096}
      temperature: ${AI_TEMPERATURE:0.2}
      strict-json-schema: ${AI_STRICT_JSON_SCHEMA:false}
      response-format: ${AI_RESPONSE_FORMAT:json_object}
      log-requests: ${AI_LOG_REQUESTS:false}
      log-responses: ${AI_LOG_RESPONSES:false}
    streaming-chat-model:
      base-url: ${AI_BASE_URL:https://api.openai.com/v1}
      api-key: ${AI_API_KEY:placeholder-key}
      model-name: ${AI_MODEL:gpt-4o-mini}
      max-tokens: ${AI_MAX_TOKENS:4096}
      temperature: ${AI_TEMPERATURE:0.2}
      log-requests: ${AI_LOG_REQUESTS:false}
      log-responses: ${AI_LOG_RESPONSES:false}
