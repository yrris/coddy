spring:
  application:
    name: coddy
  profiles:
    active: local
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  session:
    store-type: redis
    timeout: ${SESSION_TIMEOUT_SECONDS:2592000}

server:
  port: ${SERVER_PORT:8765}
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: ${SESSION_TIMEOUT_SECONDS:2592000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.yrris.coddy.controller

knife4j:
  enable: true
  setting:
    language: en

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  auth:
    google:
      enabled: ${GOOGLE_AUTH_ENABLED:false}
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
